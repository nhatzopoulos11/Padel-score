<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ court.court_name }} - {{ club.club_name }}</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #0a0e1a;
    color: white;
    font-family: 'Arial', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px;
    background: rgba(255,255,255,0.05);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}
.header-left { font-size: 14px; color: #00d4ff; font-weight: bold; }
.header-right { font-size: 12px; color: #888; }

.timer-bar {
    text-align: center;
    padding: 6px;
    background: rgba(255,255,255,0.03);
    font-size: 13px;
    color: #aaa;
}
.timer-bar span { color: #00d4ff; font-weight: bold; font-size: 15px; }
.timer-warning { color: #ff6b6b !important; }

.sync-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #00ff88;
    margin-left: 8px;
    vertical-align: middle;
    transition: background 0.3s;
}
.sync-dot.syncing { background: #ffd700; }
.sync-dot.error   { background: #ff4444; }

.scoreboard {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 8px;
    gap: 6px;
}

.player-row {
    flex: 1;
    display: grid;
    grid-template-columns: 200px 1fr auto;
    gap: 8px;
    align-items: center;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 10px 16px;
    border: 2px solid transparent;
    transition: border-color 0.3s;
}
.player-row.serving { border-color: #00d4ff; }
.player-row.winner-flash { animation: winnerFlash 0.5s ease infinite; }

@keyframes winnerFlash {
    0%, 100% { background: rgba(255,255,255,0.05); }
    50%       { background: rgba(0,212,255,0.2); }
}

.player-names { display: flex; flex-direction: column; gap: 2px; }
.player-name {
    font-size: 22px;
    font-weight: bold;
    color: white;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 6px;
    transition: background 0.2s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
}
.player-name:hover { background: rgba(255,255,255,0.1); }
.player-name.editing {
    background: rgba(0,212,255,0.2);
    outline: none;
    border: 1px solid #00d4ff;
}
.serve-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #00d4ff;
    display: inline-block;
    margin-left: 6px;
    opacity: 0;
}
.player-row.serving .serve-dot { opacity: 1; }

.scores {
    display: flex;
    gap: 12px;
    align-items: center;
    justify-content: center;
}

.points-display {
    font-size: 110px;
    font-weight: 900;
    line-height: 1;
    color: white;
    min-width: 140px;
    text-align: center;
    cursor: pointer;
    border-radius: 12px;
    transition: background 0.2s, transform 0.1s;
    padding: 0 10px;
}
.points-display:hover  { background: rgba(255,255,255,0.1); transform: scale(1.02); }
.points-display:active { transform: scale(0.98); }
.points-display.golden { color: #ffd700; }

.games-display {
    font-size: 52px;
    font-weight: 700;
    color: #00d4ff;
    min-width: 60px;
    text-align: center;
    cursor: pointer;
    border-radius: 8px;
    padding: 0 8px;
    transition: background 0.2s;
}
.games-display:hover { background: rgba(255,255,255,0.1); }

.sets-display { display: flex; flex-direction: column; gap: 8px; min-width: 80px; }
.set-score { font-size: 28px; font-weight: bold; color: #888; text-align: center; }
.set-score.current-set { color: white; }
.set-label { font-size: 11px; color: #555; text-align: center; }

.divider {
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    margin: 2px 8px;
}

.controls {
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    background: rgba(255,255,255,0.03);
    border-top: 1px solid rgba(255,255,255,0.1);
}

.btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
}
.btn:hover  { transform: translateY(-1px); opacity: 0.9; }
.btn:active { transform: translateY(0); }
.btn-undo     { background: #2a2a3e; color: #aaa;    border: 1px solid #444; }
.btn-new-game { background: #1a3a2a; color: #00ff88; border: 1px solid #00ff88; }
.btn-settings { background: #1a1a2e; color: #888;    border: 1px solid #333; }

.status-bar {
    text-align: center;
    padding: 4px;
    font-size: 12px;
    color: #555;
    background: #070a12;
}
.status-bar .golden-point-msg { color: #ffd700; font-weight: bold; font-size: 14px; }

.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 100;
    align-items: center;
    justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
    background: #1a1f35;
    border-radius: 16px;
    padding: 30px;
    min-width: 320px;
    border: 1px solid rgba(255,255,255,0.1);
}
.modal h3 { color: #00d4ff; margin-bottom: 20px; text-align: center; font-size: 20px; }
.modal-btn {
    width: 100%;
    padding: 14px;
    margin: 6px 0;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
}
.modal-btn:hover { opacity: 0.85; transform: scale(1.01); }
.modal-btn-primary { background: linear-gradient(135deg, #00d4ff, #0099cc); color: white; }
.modal-btn-danger  { background: linear-gradient(135deg, #ff4444, #cc0000); color: white; }
.modal-btn-cancel  { background: #2a2a3e; color: #aaa; }

.win-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
}
.win-overlay.show { display: flex; }
.win-text    { font-size: 48px; font-weight: 900; color: #ffd700; margin-bottom: 10px; }
.win-subtext { font-size: 24px; color: white;  margin-bottom: 30px; }
.win-score   { font-size: 18px; color: #aaa;   margin-bottom: 30px; }
</style>
</head>
<body>

<div class="header">
    <div class="header-left">
        🎾 {{ club.club_name }} — {{ court.court_name }}
        <span class="sync-dot" id="syncDot" title="Synced"></span>
    </div>
    <div class="header-right" id="currentTime"></div>
</div>

<div class="timer-bar">
    ⏱ Match time: <span id="matchTimer">00:00</span>
    &nbsp;&nbsp;|&nbsp;&nbsp;
    🏟 Court time: <span id="courtTimer">30:00</span>
</div>

<div class="scoreboard">
    <div class="player-row serving" id="row0">
        <div class="player-names">
            <div class="player-name" id="name0" contenteditable="false"
                 onclick="editName(0)" onblur="saveName(0, this)">Player 1</div>
            <div class="player-name" id="name1" contenteditable="false"
                 onclick="editName(1)" onblur="saveName(1, this)">Player 2</div>
            <span class="serve-dot"></span>
        </div>
        <div class="scores">
            <div class="points-display" id="points0" onclick="addPoint(0)">0</div>
            <div class="games-display" id="games0" onclick="addGame(0)">0</div>
        </div>
        <div class="sets-display" id="sets0"></div>
    </div>

    <div class="divider"></div>

    <div class="player-row" id="row1">
        <div class="player-names">
            <div class="player-name" id="name2" contenteditable="false"
                 onclick="editName(2)" onblur="saveName(2, this)">Player 3</div>
            <div class="player-name" id="name3" contenteditable="false"
                 onclick="editName(3)" onblur="saveName(3, this)">Player 4</div>
            <span class="serve-dot"></span>
        </div>
        <div class="scores">
            <div class="points-display" id="points1" onclick="addPoint(1)">0</div>
            <div class="games-display" id="games1" onclick="addGame(1)">0</div>
        </div>
        <div class="sets-display" id="sets1"></div>
    </div>
</div>

<div class="status-bar">
    <span id="statusMsg">Tap score to add point • Tap name to edit • Match in progress</span>
</div>

<div class="controls">
    <button class="btn btn-undo"     onclick="undo()">↩ Undo</button>
    <button class="btn btn-new-game" onclick="showNewGameModal()">+ New Match</button>
    <button class="btn btn-settings" onclick="showSettingsModal()">⚙ Settings</button>
</div>

<!-- NEW GAME MODAL -->
<div class="modal-overlay" id="newGameModal">
    <div class="modal">
        <h3>🎾 Start New Match?</h3>
        <p style="color:#aaa; text-align:center; margin-bottom:20px; font-size:14px;">
            This will reset all scores
        </p>
        <button class="modal-btn modal-btn-danger"  onclick="newGame()">Reset & Start New</button>
        <button class="modal-btn modal-btn-cancel"  onclick="closeModal('newGameModal')">Cancel</button>
    </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal">
    <div class="modal">
        <h3>⚙ Settings</h3>
        <div style="margin-bottom:16px;">
            <label style="color:#aaa; font-size:13px;">Sets to win match:</label>
            <select id="setsToWin" style="width:100%; padding:10px; margin-top:6px;
                    background:#2a2a3e; color:white; border:1px solid #444;
                    border-radius:8px; font-size:16px;">
                <option value="1">1 Set</option>
                <option value="2" selected>2 Sets (Best of 3)</option>
                <option value="3">3 Sets (Best of 5)</option>
            </select>
        </div>
        <div style="margin-bottom:16px;">
            <label style="color:#aaa; font-size:13px;">Golden Point (deuce):</label>
            <select id="goldenPointSetting" style="width:100%; padding:10px; margin-top:6px;
                    background:#2a2a3e; color:white; border:1px solid #444;
                    border-radius:8px; font-size:16px;">
                <option value="true"  selected>Enabled</option>
                <option value="false">Disabled (normal deuce)</option>
            </select>
        </div>
        <div style="margin-bottom:20px;">
            <label style="color:#aaa; font-size:13px;">Court time (minutes):</label>
            <select id="courtTimeSetting" style="width:100%; padding:10px; margin-top:6px;
                    background:#2a2a3e; color:white; border:1px solid #444;
                    border-radius:8px; font-size:16px;">
                <option value="30"  selected>30 minutes</option>
                <option value="60">60 minutes</option>
                <option value="90">90 minutes</option>
                <option value="120">120 minutes</option>
            </select>
        </div>
        <button class="modal-btn modal-btn-primary" onclick="saveSettings()">Save Settings</button>
        <button class="modal-btn modal-btn-cancel"  onclick="closeModal('settingsModal')">Cancel</button>
    </div>
</div>

<!-- WIN OVERLAY -->
<div class="win-overlay" id="winOverlay">
    <div class="win-text"    id="winText">🏆 Team Wins!</div>
    <div class="win-subtext" id="winSubtext"></div>
    <div class="win-score"   id="winScore"></div>
    <button class="modal-btn modal-btn-primary"
            style="min-width:200px; padding:16px; font-size:18px;"
            onclick="newGame()">New Match</button>
</div>

<script>
// ─────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────
const COURT_TOKEN = "{{ court.access_token }}";

// ─────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────
let state = {
    points:   [0, 0],
    games:    [0, 0],
    sets:     [[], []],
    serving:  0,
    matchOver: false
};

let settings = {
    setsToWin:    2,
    goldenPoint:  true,
    courtMinutes: 30
};

let playerNames    = ['Player 1', 'Player 2', 'Player 3', 'Player 4'];
let matchSeconds   = 0;
let courtSeconds   = 0;
let courtInitialised = false;

let history        = [];
const MAX_HISTORY  = 50;

let lastSyncTime   = 0;
let isSaving       = false;
let pendingSave    = false;

// ─────────────────────────────────────────
// SYNC STATUS DOT  ← THE MISSING FUNCTION
// ─────────────────────────────────────────
function setSyncStatus(status) {
    const dot = document.getElementById('syncDot');
    if (!dot) return;
    dot.className = 'sync-dot'; // reset
    if (status === 'syncing') {
        dot.classList.add('syncing');
        dot.title = 'Saving…';
    } else if (status === 'error') {
        dot.classList.add('error');
        dot.title = 'Sync error – check connection';
    } else {
        // 'ok' — default green
        dot.title = 'Synced';
    }
}

// ─────────────────────────────────────────
// CLOCK
// ─────────────────────────────────────────
function updateClock() {
    document.getElementById('currentTime').textContent =
        new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
async function init() {
    updateClock();
    setInterval(updateClock, 1000);
    await loadFromServer();
    startTimers();
    updateDisplay();
    startPolling();
}

// ─────────────────────────────────────────
// LOAD FROM SERVER
// ─────────────────────────────────────────
async function loadFromServer() {
    setSyncStatus('syncing');
    try {
        const res = await fetch(`/api/court/${COURT_TOKEN}/state`);
        if (!res.ok) { setSyncStatus('error'); initDefaults(); return; }

        const data = await res.json();

        // No saved state yet
        if (!data.state || Object.keys(data.state).length === 0) {
            setSyncStatus('ok');
            initDefaults();
            return;
        }

        applyServerData(data);
        setSyncStatus('ok');

    } catch (e) {
        console.warn('loadFromServer failed:', e);
        setSyncStatus('error');
        initDefaults();
    }
}

// ─────────────────────────────────────────
// SAVE TO SERVER  (debounced, no overlap)
// ─────────────────────────────────────────
async function saveToServer() {
    if (isSaving) { pendingSave = true; return; }
    isSaving = true;
    setSyncStatus('syncing');

    const now     = Date.now();
    const payload = {
        state,
        settings,
        playerNames,
        matchSeconds,
        courtSeconds,
        syncTime: now
    };

    try {
        const res = await fetch(`/api/court/${COURT_TOKEN}/state`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(payload)
        });
        if (res.ok) {
            lastSyncTime = now;
            setSyncStatus('ok');
        } else {
            setSyncStatus('error');
        }
    } catch (e) {
        setSyncStatus('error');
    }

    isSaving = false;
    if (pendingSave) {
        pendingSave = false;
        saveToServer();
    }
}

// ─────────────────────────────────────────
// POLLING
// ─────────────────────────────────────────
function startPolling() {
    setInterval(async () => {
        if (isSaving) return;
        try {
            const res = await fetch(`/api/court/${COURT_TOKEN}/state`);
            if (!res.ok) return;
            const data = await res.json();
            if (!data || !data.state || Object.keys(data.state).length === 0) return;

            const serverTime = data.syncTime || 0;
            if (serverTime > lastSyncTime) {
                applyServerData(data);
                updateDisplay();
                setSyncStatus('ok');
            }
        } catch (e) { /* ignore */ }
    }, 2000);
}

// ─────────────────────────────────────────
// APPLY SERVER DATA
// ─────────────────────────────────────────
function applyServerData(data) {
    if (data.state)       state       = data.state;
    if (data.settings)    settings    = data.settings;
    if (data.playerNames) playerNames = data.playerNames;

    if (data.matchSeconds !== undefined) matchSeconds = data.matchSeconds;

    if (data.courtSeconds !== undefined && data.courtSeconds > 0) {
        courtSeconds     = data.courtSeconds;
        courtInitialised = true;
    } else if (!courtInitialised) {
        courtSeconds     = settings.courtMinutes * 60;
        courtInitialised = true;
    }

    lastSyncTime = data.syncTime || 0;

    // Sync settings dropdowns
    document.getElementById('setsToWin').value          = settings.setsToWin;
    document.getElementById('goldenPointSetting').value = settings.goldenPoint;
    document.getElementById('courtTimeSetting').value   = settings.courtMinutes;

    // Sync name elements (skip if user is actively editing)
    for (let i = 0; i < 4; i++) {
        const el = document.getElementById('name' + i);
        if (el && el.contentEditable !== 'true') {
            el.textContent = playerNames[i];
        }
    }

    if (state.matchOver) rebuildWinOverlay();
}

function initDefaults() {
    if (!courtInitialised) {
        courtSeconds     = settings.courtMinutes * 60;
        courtInitialised = true;
    }
}

// ─────────────────────────────────────────
// TIMERS
// ─────────────────────────────────────────
function startTimers() {
    setInterval(() => {
        if (!state.matchOver) {
            matchSeconds++;
            updateTimerDisplay();
        }
    }, 1000);

    setInterval(() => {
        if (courtSeconds > 0) courtSeconds--;
        updateTimerDisplay();
    }, 1000);

    updateTimerDisplay();
}

function updateTimerDisplay() {
    document.getElementById('matchTimer').textContent = formatTime(matchSeconds);
    const courtEl = document.getElementById('courtTimer');
    courtEl.textContent = formatTime(courtSeconds);
    courtEl.className   = courtSeconds <= 300 ? 'timer-warning' : '';
}

function formatTime(s) {
    const m = Math.floor(s / 60).toString().padStart(2, '0');
    return `${m}:${(s % 60).toString().padStart(2, '0')}`;
}

// ─────────────────────────────────────────
// SCORING
// ─────────────────────────────────────────
const POINT_LABELS = ['0', '15', '30', '40', 'AD'];

function addPoint(team) {
    if (state.matchOver) return;
    saveHistory();
    const opp = 1 - team;

    // Deuce
    if (state.points[0] === 3 && state.points[1] === 3) {
        if (settings.goldenPoint) {
            winGame(team);
        } else {
            state.points[team] = 4;   // advantage
            updateDisplay();
            saveToServer();
        }
        return;
    }

    // Has advantage → wins game
    if (state.points[team] === 4) { winGame(team); return; }

    // Opponent has advantage → back to deuce
    if (state.points[opp] === 4) {
        state.points = [3, 3];
        updateDisplay();
        saveToServer();
        return;
    }

    // Normal increment
    state.points[team]++;

    // Win game if reached 4 points and no deuce possible
    if (state.points[team] >= 4 && state.points[opp] < 3) {
        winGame(team);
        return;
    }

    updateDisplay();
    saveToServer();
}

function winGame(team) {
    state.points  = [0, 0];
    state.games[team]++;
    state.serving = 1 - state.serving;
    checkSetWin(team);
}

function checkSetWin(team) {
    const opp = 1 - team;
    const tG  = state.games[team];
    const oG  = state.games[opp];

    const wonSet = (tG >= 6 && tG - oG >= 2) || tG === 7;

    if (wonSet) {
        state.sets[0].push(state.games[0]);
        state.sets[1].push(state.games[1]);
        state.games = [0, 0];

        const setsWon = state.sets[team].filter(
            (s, i) => s > state.sets[opp][i]
        ).length;

        if (setsWon >= settings.setsToWin) {
            state.matchOver = true;
            showWinner(team);
        }
    }

    updateDisplay();
    saveToServer();
}

function addGame(team) {
    if (state.matchOver) return;
    saveHistory();
    winGame(team);
}

// ─────────────────────────────────────────
// DISPLAY
// ─────────────────────────────────────────
function updateDisplay() {
    const isGolden = state.points[0] === 3 && state.points[1] === 3
                     && settings.goldenPoint;

    for (let t = 0; t < 2; t++) {
        const ptEl = document.getElementById('points' + t);
        if (isGolden) {
            ptEl.textContent = '🥇';
            ptEl.className   = 'points-display golden';
        } else {
            ptEl.textContent = POINT_LABELS[state.points[t]] || '0';
            ptEl.className   = 'points-display';
        }
        document.getElementById('games' + t).textContent = state.games[t];
        document.getElementById('row'   + t).className   =
            'player-row' + (state.serving === t ? ' serving' : '');
        renderSets(t);
    }

    const msgEl = document.getElementById('statusMsg');
    if (isGolden) {
        msgEl.innerHTML = '<span class="golden-point-msg">⚡ GOLDEN POINT ⚡</span>';
    } else {
        msgEl.textContent = 'Tap score to add point • Tap name to edit';
    }
    updateTimerDisplay();
}

function renderSets(team) {
    const el      = document.getElementById('sets' + team);
    const numSets = state.sets[0].length;
    if (numSets === 0) { el.innerHTML = '<div class="set-label">Sets</div>'; return; }
    let html = '<div class="set-label">Sets</div>';
    for (let i = 0; i < numSets; i++) {
        html += `<div class="set-score">${state.sets[team][i]}</div>`;
    }
    el.innerHTML = html;
}

// ─────────────────────────────────────────
// WIN
// ─────────────────────────────────────────
function showWinner(team) {
    rebuildWinOverlay(team);
    document.getElementById('winOverlay').className = 'win-overlay show';
}

function rebuildWinOverlay(team) {
    if (team === undefined) {
        const s0 = state.sets[0].filter((s, i) => s > state.sets[1][i]).length;
        const s1 = state.sets[1].filter((s, i) => s > state.sets[0][i]).length;
        team = s1 > s0 ? 1 : 0;
    }
    const opp        = 1 - team;
    const winnerName = team === 0
        ? playerNames[0] + ' / ' + playerNames[1]
        : playerNames[2] + ' / ' + playerNames[3];

    const scoreStr = state.sets[team]
        .map((s, i) => `${s}-${state.sets[opp][i]}`)
        .join('  ');

    document.getElementById('winText').textContent    = '🏆 ' + winnerName;
    document.getElementById('winSubtext').textContent = 'Wins the Match!';
    document.getElementById('winScore').textContent   = 'Score: ' + scoreStr;

    if (state.matchOver) {
        document.getElementById('winOverlay').className = 'win-overlay show';
    }
}

// ─────────────────────────────────────────
// UNDO
// ─────────────────────────────────────────
function saveHistory() {
    history.push(JSON.parse(JSON.stringify(state)));
    if (history.length > MAX_HISTORY) history.shift();
}

function undo() {
    if (history.length === 0) return;
    state = history.pop();
    updateDisplay();
    saveToServer();
    const msgEl = document.getElementById('statusMsg');
    msgEl.textContent = '↩ Undone!';
    setTimeout(() => {
        msgEl.textContent = 'Tap score to add point • Tap name to edit';
    }, 1500);
}

// ─────────────────────────────────────────
// NAMES
// ─────────────────────────────────────────
function editName(index) {
    const el = document.getElementById('name' + index);
    el.contentEditable = 'true';
    el.className       = 'player-name editing';
    el.focus();
    const range = document.createRange();
    range.selectNodeContents(el);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
}

function saveName(index, el) {
    el.contentEditable = 'false';
    el.className       = 'player-name';
    playerNames[index] = el.textContent.trim() || ('Player ' + (index + 1));
    el.textContent     = playerNames[index];
    saveToServer();
}

// ─────────────────────────────────────────
// MODALS
// ─────────────────────────────────────────
function showNewGameModal()  { document.getElementById('newGameModal').className  = 'modal-overlay show'; }
function showSettingsModal() { document.getElementById('settingsModal').className = 'modal-overlay show'; }
function closeModal(id)      { document.getElementById(id).className = 'modal-overlay'; }

function newGame() {
    state = {
        points:   [0, 0],
        games:    [0, 0],
        sets:     [[], []],
        serving:  0,
        matchOver: false
    };
    history      = [];
    matchSeconds = 0;
    courtSeconds = settings.courtMinutes * 60;
    courtInitialised = true;

    document.getElementById('winOverlay').className = 'win-overlay';
    closeModal('newGameModal');
    updateDisplay();
    saveToServer();
}

function saveSettings() {
    settings.setsToWin    = parseInt(document.getElementById('setsToWin').value);
    settings.goldenPoint  = document.getElementById('goldenPointSetting').value === 'true';
    settings.courtMinutes = parseInt(document.getElementById('courtTimeSetting').value);
    courtSeconds          = settings.courtMinutes * 60;
    courtInitialised      = true;

    closeModal('settingsModal');
    updateDisplay();
    saveToServer();
}

// Close modal on backdrop click
document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', function (e) {
        if (e.target === this) closeModal(this.id);
    });
});

// ─────────────────────────────────────────
// START
// ─────────────────────────────────────────
init();
</script>
</body>
</html>
