<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{{ court.court_name }} - {{ club.club_name }}</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    background: #0a0e1a;
    color: white;
    font-family: 'Arial', sans-serif;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px;
    background: rgba(255,255,255,0.05);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
}
.header-left { font-size: 14px; color: #00d4ff; font-weight: bold; }
.header-right { font-size: 12px; color: #888; }

.timer-bar {
    text-align: center;
    padding: 6px;
    background: rgba(255,255,255,0.03);
    font-size: 13px;
    color: #aaa;
    flex-shrink: 0;
}
.timer-bar span { color: #00d4ff; font-weight: bold; font-size: 15px; }
.timer-warning { color: #ff6b6b !important; }

.sync-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #00ff88;
    margin-left: 8px;
    vertical-align: middle;
    transition: background 0.3s;
}
.sync-dot.syncing { background: #ffd700; }
.sync-dot.error   { background: #ff4444; }

.scoreboard {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 8px;
    gap: 6px;
    min-height: 0;
}

.player-row {
    flex: 1;
    display: grid;
    grid-template-columns: 180px 1fr auto;
    gap: 8px;
    align-items: center;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 10px 12px;
    border: 2px solid transparent;
    transition: border-color 0.3s;
    min-height: 0;
}
.player-row.serving { border-color: #00d4ff; }

@keyframes winnerFlash {
    0%, 100% { background: rgba(255,255,255,0.05); }
    50%       { background: rgba(0,212,255,0.2); }
}

.player-names {
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow: hidden;
}

.player-name {
    font-size: 20px;
    font-weight: bold;
    color: white;
    padding: 4px 6px;
    border-radius: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    /* No contenteditable here — we use a modal input instead */
}
.player-name:active { background: rgba(255,255,255,0.15); }

.serve-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #00d4ff;
    display: inline-block;
    margin-top: 4px;
    opacity: 0;
    flex-shrink: 0;
}
.player-row.serving .serve-dot { opacity: 1; }

.scores {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
}

/* ── SCORE BUTTONS — real <button> so touch works everywhere ── */
.points-btn {
    font-size: 100px;
    font-weight: 900;
    line-height: 1;
    color: white;
    min-width: 130px;
    text-align: center;
    background: transparent;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    padding: 0 8px;
    transition: background 0.15s, transform 0.1s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    /* Prevent double-fire */
    -webkit-touch-callout: none;
}
.points-btn:hover  { background: rgba(255,255,255,0.1); }
.points-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.2); }
.points-btn.golden { color: #ffd700; }

.games-btn {
    font-size: 48px;
    font-weight: 700;
    color: #00d4ff;
    min-width: 56px;
    text-align: center;
    background: transparent;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    padding: 0 6px;
    transition: background 0.15s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
}
.games-btn:active { background: rgba(255,255,255,0.15); }

.sets-display {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 52px;
}
.set-score { font-size: 26px; font-weight: bold; color: #888; text-align: center; }
.set-label { font-size: 11px; color: #555; text-align: center; }

.divider {
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    margin: 0 8px;
    flex-shrink: 0;
}

.controls {
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    background: rgba(255,255,255,0.03);
    border-top: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
}

.btn {
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.96); }
.btn-undo     { background: #2a2a3e; color: #aaa;    border: 1px solid #444; }
.btn-new-game { background: #1a3a2a; color: #00ff88; border: 1px solid #00ff88; }
.btn-settings { background: #1a1a2e; color: #888;    border: 1px solid #333; }

.status-bar {
    text-align: center;
    padding: 4px;
    font-size: 12px;
    color: #555;
    background: #070a12;
    flex-shrink: 0;
}
.golden-point-msg { color: #ffd700; font-weight: bold; font-size: 14px; }

/* ── MODALS ── */
.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    touch-action: manipulation;
}
.modal-overlay.show { display: flex; }
.modal {
    background: #1a1f35;
    border-radius: 16px;
    padding: 28px 24px;
    width: min(360px, 92vw);
    border: 1px solid rgba(255,255,255,0.1);
}
.modal h3 { color: #00d4ff; margin-bottom: 16px; text-align: center; font-size: 20px; }
.modal-btn {
    width: 100%;
    padding: 14px;
    margin: 6px 0;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
}
.modal-btn:active { opacity: 0.8; transform: scale(0.98); }
.modal-btn-primary { background: linear-gradient(135deg, #00d4ff, #0099cc); color: white; }
.modal-btn-danger  { background: linear-gradient(135deg, #ff4444, #cc0000); color: white; }
.modal-btn-cancel  { background: #2a2a3e; color: #aaa; }

/* Name edit modal */
.name-input {
    width: 100%;
    padding: 14px;
    margin: 8px 0 16px;
    background: #2a2a3e;
    color: white;
    border: 2px solid #00d4ff;
    border-radius: 10px;
    font-size: 20px;
    outline: none;
}

.win-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
}
.win-overlay.show { display: flex; }
.win-text    { font-size: 42px; font-weight: 900; color: #ffd700; margin-bottom: 10px; }
.win-subtext { font-size: 22px; color: white;  margin-bottom: 20px; }
.win-score   { font-size: 18px; color: #aaa;   margin-bottom: 30px; }
</style>
</head>
<body>

<div class="header">
    <div class="header-left">
        🎾 {{ club.club_name }} — {{ court.court_name }}
        <span class="sync-dot" id="syncDot" title="Synced"></span>
    </div>
    <div class="header-right" id="currentTime"></div>
</div>

<div class="timer-bar">
    ⏱ <span id="matchTimer">00:00</span>
    &nbsp;|&nbsp;
    🏟 <span id="courtTimer">30:00</span>
</div>

<div class="scoreboard">
    <!-- TEAM 0 -->
    <div class="player-row serving" id="row0">
        <div class="player-names">
            <div class="player-name" id="name0" onclick="promptName(0)">Player 1</div>
            <div class="player-name" id="name1" onclick="promptName(1)">Player 2</div>
            <span class="serve-dot"></span>
        </div>
        <div class="scores">
            <button class="points-btn" id="points0" onclick="addPoint(0)">0</button>
            <button class="games-btn"  id="games0"  onclick="addGame(0)">0</button>
        </div>
        <div class="sets-display" id="sets0"></div>
    </div>

    <div class="divider"></div>

    <!-- TEAM 1 -->
    <div class="player-row" id="row1">
        <div class="player-names">
            <div class="player-name" id="name2" onclick="promptName(2)">Player 3</div>
            <div class="player-name" id="name3" onclick="promptName(3)">Player 4</div>
            <span class="serve-dot"></span>
        </div>
        <div class="scores">
            <button class="points-btn" id="points1" onclick="addPoint(1)">0</button>
            <button class="games-btn"  id="games1"  onclick="addGame(1)">0</button>
        </div>
        <div class="sets-display" id="sets1"></div>
    </div>
</div>

<div class="status-bar">
    <span id="statusMsg">Tap score to add point • Tap name to edit</span>
</div>

<div class="controls">
    <button class="btn btn-undo"     onclick="undo()">↩ Undo</button>
    <button class="btn btn-new-game" onclick="showModal('newGameModal')">+ New Match</button>
    <button class="btn btn-settings" onclick="showSettingsModal()">⚙ Settings</button>
</div>

<!-- NAME EDIT MODAL -->
<div class="modal-overlay" id="nameModal">
    <div class="modal">
        <h3>✏️ Edit Name</h3>
        <input class="name-input" id="nameInput" type="text" maxlength="20"
               placeholder="Enter name…"
               onkeydown="if(event.key==='Enter') saveNameModal()">
        <button class="modal-btn modal-btn-primary" onclick="saveNameModal()">Save</button>
        <button class="modal-btn modal-btn-cancel"  onclick="closeModal('nameModal')">Cancel</button>
    </div>
</div>

<!-- NEW GAME MODAL -->
<div class="modal-overlay" id="newGameModal">
    <div class="modal">
        <h3>🎾 Start New Match?</h3>
        <p style="color:#aaa; text-align:center; margin-bottom:16px; font-size:14px;">
            This will reset all scores
        </p>
        <button class="modal-btn modal-btn-danger"  onclick="newGame()">Reset & Start New</button>
        <button class="modal-btn modal-btn-cancel"  onclick="closeModal('newGameModal')">Cancel</button>
    </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal">
    <div class="modal">
        <h3>⚙ Settings</h3>
        <div style="margin-bottom:14px;">
            <label style="color:#aaa; font-size:13px;">Sets to win:</label>
            <select id="setsToWin" style="width:100%; padding:10px; margin-top:6px;
                    background:#2a2a3e; color:white; border:1px solid #444;
                    border-radius:8px; font-size:16px;">
                <option value="1">1 Set</option>
                <option value="2" selected>2 Sets (Best of 3)</option>
                <option value="3">3 Sets (Best of 5)</option>
            </select>
        </div>
        <div style="margin-bottom:14px;">
            <label style="color:#aaa; font-size:13px;">Golden Point (deuce):</label>
            <select id="goldenPointSetting" style="width:100%; padding:10px; margin-top:6px;
                    background:#2a2a3e; color:white; border:1px solid #444;
                    border-radius:8px; font-size:16px;">
                <option value="true"  selected>Enabled</option>
                <option value="false">Disabled (normal deuce)</option>
            </select>
        </div>
        <div style="margin-bottom:20px;">
            <label style="color:#aaa; font-size:13px;">Court time (minutes):</label>
            <select id="courtTimeSetting" style="width:100%; padding:10px; margin-top:6px;
                    background:#2a2a3e; color:white; border:1px solid #444;
                    border-radius:8px; font-size:16px;">
                <option value="30"  selected>30 min</option>
                <option value="60">60 min</option>
                <option value="90">90 min</option>
                <option value="120">120 min</option>
            </select>
        </div>
        <button class="modal-btn modal-btn-primary" onclick="saveSettings()">Save</button>
        <button class="modal-btn modal-btn-cancel"  onclick="closeModal('settingsModal')">Cancel</button>
    </div>
</div>

<!-- WIN OVERLAY -->
<div class="win-overlay" id="winOverlay">
    <div class="win-text"    id="winText">🏆</div>
    <div class="win-subtext" id="winSubtext"></div>
    <div class="win-score"   id="winScore"></div>
    <button class="modal-btn modal-btn-primary"
            style="min-width:200px; padding:16px; font-size:18px; margin-top:10px;"
            onclick="newGame()">New Match</button>
</div>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const COURT_TOKEN  = "{{ court.access_token }}";
const POLL_MS      = 2500;   // how often to check server for remote changes

// ═══════════════════════════════════════════
// STATE  (single source of truth)
// ═══════════════════════════════════════════
let state = {
    points:    [0, 0],
    games:     [0, 0],
    sets:      [[], []],
    serving:   0,
    matchOver: false
};

let settings = {
    setsToWin:    2,
    goldenPoint:  true,
    courtMinutes: 30
};

let playerNames = ['Player 1', 'Player 2', 'Player 3', 'Player 4'];

// ── Timers ──────────────────────────────────
// We store ABSOLUTE epoch timestamps so devices
// can reconstruct elapsed time from wall-clock.
// matchStart  = epoch ms when match started (0 = not started)
// courtEnd    = epoch ms when court time runs out
let matchStart  = 0;         // epoch ms
let courtEnd    = 0;         // epoch ms  (now + courtMinutes*60*1000)

// Local display values (computed each second)
let matchSeconds  = 0;
let courtSecsLeft = 0;

// ── Sync ────────────────────────────────────
// syncTime = epoch ms of last write; used to decide which device's
// data is newer. Devices only adopt server data if syncTime > their own.
let syncTime  = 0;           // timestamp of data currently loaded/shown
let isSaving  = false;
let pendingSave = false;
let _editingNameIndex = -1;

// ── History ─────────────────────────────────
let history = [];
const MAX_HISTORY = 50;

// ═══════════════════════════════════════════
// SYNC STATUS DOT
// ═══════════════════════════════════════════
function setSyncStatus(s) {
    const dot = document.getElementById('syncDot');
    if (!dot) return;
    dot.className = 'sync-dot' + (s === 'ok' ? '' : ' ' + s);
    dot.title = s === 'syncing' ? 'Saving…'
              : s === 'error'   ? 'Sync error'
              :                   'Synced';
}

// ═══════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════
function updateClock() {
    document.getElementById('currentTime').textContent =
        new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// ═══════════════════════════════════════════
// TIMERS  — epoch-based, drift-free
// ═══════════════════════════════════════════
function startTimerTick() {
    setInterval(() => {
        const now = Date.now();

        // Match timer
        if (matchStart > 0 && !state.matchOver) {
            matchSeconds = Math.floor((now - matchStart) / 1000);
        }

        // Court countdown
        if (courtEnd > 0) {
            courtSecsLeft = Math.max(0, Math.floor((courtEnd - now) / 1000));
        }

        updateTimerDisplay();
    }, 500);   // 500ms tick keeps display smooth without drift
}

function updateTimerDisplay() {
    document.getElementById('matchTimer').textContent = formatTime(matchSeconds);
    const courtEl = document.getElementById('courtTimer');
    courtEl.textContent = formatTime(courtSecsLeft);
    courtEl.className   = courtSecsLeft <= 300 && courtSecsLeft > 0
                          ? 'timer-warning' : '';
}

function formatTime(s) {
    s = Math.max(0, Math.floor(s));
    return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
}

// ═══════════════════════════════════════════
// SERVER — LOAD
// ═══════════════════════════════════════════
async function loadFromServer() {
    setSyncStatus('syncing');
    try {
        const res = await fetch(`/api/court/${COURT_TOKEN}/state`);
        if (!res.ok) { setSyncStatus('error'); initDefaults(); return; }
        const data = await res.json();
        if (!data || !data.state) { setSyncStatus('ok'); initDefaults(); return; }
        applyData(data);
        setSyncStatus('ok');
    } catch(e) {
        console.warn('load failed:', e);
        setSyncStatus('error');
        initDefaults();
    }
}

function initDefaults() {
    if (matchStart === 0) matchStart = Date.now();
    if (courtEnd   === 0) courtEnd   = Date.now() + settings.courtMinutes * 60000;
}

// ═══════════════════════════════════════════
// SERVER — SAVE  (no-overlap, debounced)
// ═══════════════════════════════════════════
async function saveToServer() {
    if (isSaving) { pendingSave = true; return; }
    isSaving = true;
    setSyncStatus('syncing');

    const now     = Date.now();
    syncTime      = now;         // WE own this version

    const payload = {
        state,
        settings,
        playerNames,
        matchStart,
        courtEnd,
        syncTime: now
    };

    try {
        const res = await fetch(`/api/court/${COURT_TOKEN}/state`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(payload)
        });
        setSyncStatus(res.ok ? 'ok' : 'error');
    } catch(e) {
        setSyncStatus('error');
    }

    isSaving = false;
    if (pendingSave) { pendingSave = false; saveToServer(); }
}

// ═══════════════════════════════════════════
// SERVER — POLL  (receive remote changes)
// ═══════════════════════════════════════════
function startPolling() {
    setInterval(async () => {
        if (isSaving) return;          // don't read while we're writing
        try {
            const res = await fetch(`/api/court/${COURT_TOKEN}/state`);
            if (!res.ok) return;
            const data = await res.json();
            if (!data || !data.state) return;

            // Only adopt if server has genuinely newer data
            if ((data.syncTime || 0) > syncTime) {
                applyData(data);
                updateDisplay();
                setSyncStatus('ok');
            }
        } catch(e) { /* ignore blips */ }
    }, POLL_MS);
}

// ═══════════════════════════════════════════
// APPLY DATA  (shared by load + poll)
// ═══════════════════════════════════════════
function applyData(data) {
    state       = data.state;
    if (data.settings)    settings    = data.settings;
    if (data.playerNames) playerNames = data.playerNames;

    // Epoch-based timers — always trust server values
    if (data.matchStart) matchStart = data.matchStart;
    if (data.courtEnd)   courtEnd   = data.courtEnd;

    syncTime = data.syncTime || 0;

    // Sync settings dropdowns
    document.getElementById('setsToWin').value          = settings.setsToWin;
    document.getElementById('goldenPointSetting').value = String(settings.goldenPoint);
    document.getElementById('courtTimeSetting').value   = settings.courtMinutes;

    // Sync name labels
    for (let i = 0; i < 4; i++) {
        const el = document.getElementById('name' + i);
        if (el) el.textContent = playerNames[i];
    }

    if (state.matchOver) showWinOverlay();
}

// ═══════════════════════════════════════════
// SCORING
// ═══════════════════════════════════════════
const PT = ['0', '15', '30', '40', 'AD'];

// Debounce guard — prevent double-tap registering two points
let _lastPointTime = 0;
function addPoint(team) {
    const now = Date.now();
    if (now - _lastPointTime < 300) return;   // 300ms debounce
    _lastPointTime = now;

    if (state.matchOver) return;
    saveHistory();
    _scorePoint(team);
}

function _scorePoint(team) {
    const opp = 1 - team;

    // Deuce situation
    if (state.points[0] === 3 && state.points[1] === 3) {
        if (settings.goldenPoint) {
            winGame(team);
        } else {
            state.points[team] = 4;
            updateDisplay(); saveToServer();
        }
        return;
    }

    // Has advantage
    if (state.points[team] === 4) { winGame(team); return; }

    // Opponent has advantage → back to deuce
    if (state.points[opp] === 4) {
        state.points = [3, 3];
        updateDisplay(); saveToServer();
        return;
    }

    // Normal increment
    state.points[team]++;

    // Win game: scored 4th point, opponent not at 3 (no deuce risk)
    if (state.points[team] >= 4 && state.points[opp] < 3) {
        winGame(team); return;
    }

    updateDisplay(); saveToServer();
}

function winGame(team) {
    state.points  = [0, 0];
    state.games[team]++;
    state.serving = 1 - state.serving;
    checkSetWin(team);
}

function checkSetWin(team) {
    const opp = 1 - team;
    const tG = state.games[team], oG = state.games[opp];
    const wonSet = (tG >= 6 && tG - oG >= 2) || tG === 7;

    if (wonSet) {
        state.sets[0].push(state.games[0]);
        state.sets[1].push(state.games[1]);
        state.games = [0, 0];

        const setsWon = state.sets[team]
            .filter((s, i) => s > state.sets[opp][i]).length;

        if (setsWon >= settings.setsToWin) {
            state.matchOver = true;
            updateDisplay();
            saveToServer();
            showWinOverlay(team);
            return;
        }
    }

    updateDisplay();
    saveToServer();
}

function addGame(team) {
    const now = Date.now();
    if (now - _lastPointTime < 300) return;
    _lastPointTime = now;
    if (state.matchOver) return;
    saveHistory();
    winGame(team);
}

// ═══════════════════════════════════════════
// DISPLAY
// ═══════════════════════════════════════════
function updateDisplay() {
    const isGolden = state.points[0] === 3 && state.points[1] === 3
                     && settings.goldenPoint;

    for (let t = 0; t < 2; t++) {
        const ptEl = document.getElementById('points' + t);
        if (isGolden) {
            ptEl.textContent = '🥇';
            ptEl.className   = 'points-btn golden';
        } else {
            ptEl.textContent = PT[state.points[t]] || '0';
            ptEl.className   = 'points-btn';
        }
        document.getElementById('games' + t).textContent = state.games[t];
        document.getElementById('row'   + t).className   =
            'player-row' + (state.serving === t ? ' serving' : '');
        renderSets(t);
    }

    const msgEl = document.getElementById('statusMsg');
    msgEl.innerHTML = isGolden
        ? '<span class="golden-point-msg">⚡ GOLDEN POINT ⚡</span>'
        : 'Tap score to add point • Tap name to edit';
}

function renderSets(team) {
    const el  = document.getElementById('sets' + team);
    const num = state.sets[0].length;
    if (num === 0) { el.innerHTML = '<div class="set-label">Sets</div>'; return; }
    let html = '<div class="set-label">Sets</div>';
    for (let i = 0; i < num; i++) {
        html += `<div class="set-score">${state.sets[team][i]}</div>`;
    }
    el.innerHTML = html;
}

// ═══════════════════════════════════════════
// WIN
// ═══════════════════════════════════════════
function showWinOverlay(team) {
    if (team === undefined) {
        // Determine winner from sets
        const s0 = state.sets[0].filter((s,i) => s > state.sets[1][i]).length;
        const s1 = state.sets[1].filter((s,i) => s > state.sets[0][i]).length;
        team = s1 > s0 ? 1 : 0;
    }
    const opp  = 1 - team;
    const name = team === 0
        ? playerNames[0] + ' / ' + playerNames[1]
        : playerNames[2] + ' / ' + playerNames[3];
    const score = state.sets[team].map((s,i) => `${s}-${state.sets[opp][i]}`).join('  ');

    document.getElementById('winText').textContent    = '🏆 ' + name;
    document.getElementById('winSubtext').textContent = 'Wins the Match!';
    document.getElementById('winScore').textContent   = score;
    document.getElementById('winOverlay').className   = 'win-overlay show';
}

// ═══════════════════════════════════════════
// UNDO
// ═══════════════════════════════════════════
function saveHistory() {
    history.push(JSON.parse(JSON.stringify(state)));
    if (history.length > MAX_HISTORY) history.shift();
}

function undo() {
    if (!history.length) return;
    state = history.pop();
    updateDisplay();
    saveToServer();
    const el = document.getElementById('statusMsg');
    el.textContent = '↩ Undone!';
    setTimeout(() => { el.textContent = 'Tap score to add point • Tap name to edit'; }, 1500);
}

// ═══════════════════════════════════════════
// NAME EDITING  — modal-based (no contenteditable)
// ═══════════════════════════════════════════
function promptName(index) {
    _editingNameIndex = index;
    document.getElementById('nameInput').value = playerNames[index];
    showModal('nameModal');
    setTimeout(() => document.getElementById('nameInput').focus(), 100);
}

function saveNameModal() {
    if (_editingNameIndex < 0) return;
    const val = document.getElementById('nameInput').value.trim()
                || ('Player ' + (_editingNameIndex + 1));
    playerNames[_editingNameIndex] = val;
    document.getElementById('name' + _editingNameIndex).textContent = val;
    closeModal('nameModal');
    _editingNameIndex = -1;
    saveToServer();
}

// ═══════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════
function showModal(id)  { document.getElementById(id).className = 'modal-overlay show'; }
function closeModal(id) { document.getElementById(id).className = 'modal-overlay'; }

function showSettingsModal() {
    document.getElementById('setsToWin').value          = settings.setsToWin;
    document.getElementById('goldenPointSetting').value = String(settings.goldenPoint);
    document.getElementById('courtTimeSetting').value   = settings.courtMinutes;
    showModal('settingsModal');
}

function saveSettings() {
    settings.setsToWin    = parseInt(document.getElementById('setsToWin').value);
    settings.goldenPoint  = document.getElementById('goldenPointSetting').value === 'true';
    settings.courtMinutes = parseInt(document.getElementById('courtTimeSetting').value);
    // Reset court countdown from NOW
    courtEnd = Date.now() + settings.courtMinutes * 60000;
    closeModal('settingsModal');
    updateDisplay();
    saveToServer();
}

function newGame() {
    state = { points:[0,0], games:[0,0], sets:[[],[]], serving:0, matchOver:false };
    history      = [];
    matchStart   = Date.now();
    courtEnd     = Date.now() + settings.courtMinutes * 60000;
    matchSeconds = 0;
    document.getElementById('winOverlay').className = 'win-overlay';
    closeModal('newGameModal');
    updateDisplay();
    saveToServer();
}

// Backdrop click closes any modal
document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) closeModal(el.id); });
});

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
async function init() {
    updateClock();
    setInterval(updateClock, 1000);
    await loadFromServer();
    startTimerTick();
    updateDisplay();
    startPolling();
}

init();
</script>
</body>
</html>
