<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ court.court_name }} — Live Scoreboard</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d1117;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        header {
            background: #161b22;
            border-bottom: 2px solid #21262d;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        header .title {
            color: #00d4ff;
            font-size: 1.1rem;
            font-weight: 700;
        }
        header .timer {
            font-size: 1rem;
            color: #00b894;
            font-weight: 700;
        }
        header .sets-hdr {
            font-size: 0.85rem;
            color: #f39c12;
            font-weight: 700;
        }

        /* ── Main layout ── */
        #main {
            flex: 1;
            display: grid;
            grid-template-rows: 1fr auto 1fr;
            gap: 8px;
            padding: 12px;
            min-height: 0;
        }

        /* ── Team rows ── */
        .team-row {
            border-radius: 18px;
            padding: 14px 20px;
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            align-items: center;
            gap: 16px;
            min-height: 0;
        }
        .team-row.blue { background: linear-gradient(135deg, #0055aa, #003888); }
        .team-row.red  { background: linear-gradient(135deg, #bb1100, #880d00); }

        .t-names {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }
        .t-name {
            font-size: clamp(0.9rem, 3vw, 1.6rem);
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
            opacity: 0.9;
        }
        .t-name.serving {
            color: #ffe066;
            opacity: 1;
        }
        .t-name.serving::before {
            content: '🎾 ';
            font-size: 0.85em;
        }

        .t-points {
            font-size: clamp(3.5rem, 16vw, 7rem);
            font-weight: 900;
            text-align: center;
            line-height: 1;
            text-shadow: 3px 5px 12px rgba(0,0,0,0.5);
        }
        .t-games {
            font-size: clamp(2rem, 9vw, 4rem);
            font-weight: 700;
            text-align: center;
            opacity: 0.85;
        }
        .t-sets {
            display: flex;
            flex-direction: column;
            gap: 5px;
            align-items: center;
        }
        .set-b {
            background: rgba(255,255,255,0.18);
            border-radius: 6px;
            padding: 3px 10px;
            font-size: 1rem;
            font-weight: 700;
            min-width: 34px;
            text-align: center;
        }
        .set-b.won {
            background: rgba(255,255,255,0.38);
        }

        /* ── Status bar ── */
        #statusBar {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 12px;
            text-align: center;
            padding: 8px 16px;
            font-size: clamp(1rem, 3.5vw, 1.5rem);
            font-weight: 700;
            color: #f39c12;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s, color 0.3s;
            min-height: 44px;
        }
        #statusBar.golden {
            background: #f39c12;
            color: #000;
            animation: gFlash 1s infinite;
        }
        #statusBar.match-over {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: #000;
        }
        @keyframes gFlash {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.55; }
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 6px;
            font-size: 0.72rem;
            color: #444;
            flex-shrink: 0;
        }

        /* ── Connection dot ── */
        #connDot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00b894;
            margin-right: 6px;
            vertical-align: middle;
        }
        #connDot.error { background: #ff6b6b; }
    </style>
</head>
<body>

<header>
    <span class="title">🎾 {{ court.court_name }}</span>
    <span id="timer" class="timer">00:00</span>
    <span id="setsHdr" class="sets-hdr">Sets 0 – 0</span>
</header>

<div id="main">
    <!-- Blue team -->
    <div class="team-row blue" id="rowBlue">
        <div class="t-names">
            <span class="t-name" id="bN1">BLUE</span>
            <span class="t-name" id="bN2"></span>
        </div>
        <div class="t-points" id="bPts">0</div>
        <div class="t-games"  id="bGms">0</div>
        <div class="t-sets"   id="bSets"></div>
    </div>

    <div id="statusBar">Waiting for match to start…</div>

    <!-- Red team -->
    <div class="team-row red" id="rowRed">
        <div class="t-names">
            <span class="t-name" id="rN1">RED</span>
            <span class="t-name" id="rN2"></span>
        </div>
        <div class="t-points" id="rPts">0</div>
        <div class="t-games"  id="rGms">0</div>
        <div class="t-sets"   id="rSets"></div>
    </div>
</div>

<footer>
    <span id="connDot"></span>
    Live scoreboard · {{ club.club_name }} · auto-refreshing every 2.5s
</footer>

<script>
    const TOKEN     = "{{ court.access_token }}";
    const POLL_MS   = 2500;
    const PL        = ['0', '15', '30', '40'];

    let lastHash     = '';
    let localSeconds = 0;
    let timerRunning = false;

    /* ── Render state from API ── */
    function renderState(s) {
        if (!s || Object.keys(s).length === 0) return;

        /* Player names */
        document.getElementById('bN1').textContent = s.blueP1 || 'Blue 1';
        document.getElementById('bN2').textContent = s.blueP2 || 'Blue 2';
        document.getElementById('rN1').textContent = s.redP1  || 'Red 1';
        document.getElementById('rN2').textContent = s.redP2  || 'Red 2';

        /* Clear serving highlights */
        ['bN1','bN2','rN1','rN2'].forEach(id =>
            document.getElementById(id).classList.remove('serving'));

        /* Apply serving highlight */
        if (s.serveOrder && s.currentServerIdx !== undefined) {
            const key = s.serveOrder[s.currentServerIdx % 4];
            const map = {
                blueP1: 'bN1',
                blueP2: 'bN2',
                redP1:  'rN1',
                redP2:  'rN2'
            };
            const el = document.getElementById(map[key]);
            if (el) el.classList.add('serving');
        }

        /* Points */
        if (s.isTiebreak) {
            document.getElementById('bPts').textContent = s.bluePoints;
            document.getElementById('rPts').textContent = s.redPoints;
        } else {
            const bp = s.bluePoints || 0;
            const rp = s.redPoints  || 0;
            document.getElementById('bPts').textContent =
                bp === 4 ? 'ADV' : (PL[bp] ?? '40');
            document.getElementById('rPts').textContent =
                rp === 4 ? 'ADV' : (PL[rp] ?? '40');
        }

        /* Games */
        document.getElementById('bGms').textContent = s.blueGames || 0;
        document.getElementById('rGms').textContent = s.redGames  || 0;

        /* Sets */
        const bSetsEl = document.getElementById('bSets');
        const rSetsEl = document.getElementById('rSets');
        bSetsEl.innerHTML = '';
        rSetsEl.innerHTML = '';
        const blueSets = s.blueSets || [];
        const redSets  = s.redSets  || [];
        blueSets.forEach((b, i) => {
            const r    = redSets[i] ?? 0;
            const bWon = b > r;
            const rWon = r > b;
            bSetsEl.innerHTML +=
                `<span class="set-b${bWon ? ' won' : ''}">${b}</span>`;
            rSetsEl.innerHTML +=
                `<span class="set-b${rWon ? ' won' : ''}">${r}</span>`;
        });

        /* Sets header */
        const bsw = blueSets.filter((b, i) => b > (redSets[i]  ?? 0)).length;
        const rsw = redSets.filter( (r, i) => r > (blueSets[i] ?? 0)).length;
        document.getElementById('setsHdr').textContent = `Sets ${bsw} – ${rsw}`;

        /* Status bar */
        const bar = document.getElementById('statusBar');
        bar.classList.remove('golden', 'match-over');

        if (s.matchOver) {
            const winner = bsw >= 2
                ? (s.blueP1 || 'Blue')
                : (s.redP1  || 'Red');
            bar.textContent = `🏆 Match Won — ${winner}`;
            bar.classList.add('match-over');

        } else if (s.isGoldenPoint) {
            bar.textContent = '⚡ GOLDEN POINT!';
            bar.classList.add('golden');

        } else if (s.isTiebreak) {
            bar.textContent = '🎾 TIEBREAK';

        } else if (s.bluePoints === 4) {
            bar.textContent = `Advantage ${s.blueP1 || 'Blue'}`;

        } else if (s.redPoints === 4) {
            bar.textContent = `Advantage ${s.redP1 || 'Red'}`;

        } else if (s.bluePoints === 3 && s.redPoints === 3) {
            bar.textContent = 'DEUCE';

        } else if (s.matchStarted) {
            let sv = '';
            if (s.serveOrder && s.currentServerIdx !== undefined) {
                const key = s.serveOrder[s.currentServerIdx % 4];
                sv = s[key] || '';
            }
            bar.textContent =
                `Set ${s.currentSet || 1}  •  ${sv ? sv + ' serves' : ''}`;

        } else {
            bar.textContent = 'Waiting for match to start…';
        }

        /* Sync timer */
        if (s.timerRunning && !timerRunning) {
            localSeconds = s.timerSeconds || 0;
            timerRunning = true;
        }
        if (!s.timerRunning) {
            timerRunning = false;
            localSeconds = s.timerSeconds || 0;
            renderTimer();
        }
    }

    /* ── Timer ── */
    function renderTimer() {
        const m = String(Math.floor(localSeconds / 60)).padStart(2, '0');
        const s = String(localSeconds % 60).padStart(2, '0');
        document.getElementById('timer').textContent = `${m}:${s}`;
    }

    setInterval(() => {
        if (!timerRunning) return;
        localSeconds++;
        renderTimer();
    }, 1000);

    /* ── Poll ── */
    const connDot = document.getElementById('connDot');

    function poll() {
        fetch(`/api/court/${TOKEN}/state`)
            .then(r => {
                if (!r.ok) throw new Error('Network response not ok');
                connDot.classList.remove('error');
                return r.json();
            })
            .then(data => {
                const hash = JSON.stringify(data);
                if (hash === lastHash) return;
                lastHash = hash;
                renderState(data);
            })
            .catch(() => {
                connDot.classList.add('error');
            });
    }

    setInterval(poll, POLL_MS);
    poll();
</script>
</body>
</html>
